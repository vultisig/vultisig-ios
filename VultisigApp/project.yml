name: VultisigApp

# XcodeGen-generated project. Do NOT edit VultisigApp.xcodeproj/project.pbxproj
# directly — run `make generate` from the repo root after changing this file
# or after adding/removing/renaming Swift sources.
# See ../docs/refactors/01-xcodegen.md (workspace-level) for migration context.

options:
  createIntermediateGroups: true
  generateEmptyDirectories: false
  deploymentTarget:
    iOS: "17.0"
    macOS: "15.0"
  groupSortPosition: top
  developmentLanguage: en
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.41.0"
  # Keep Package.resolved tracked even when the xcodeproj is regenerated.
  transitivelyLinkDependencies: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 5BP27CHH4Y
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.36"
    CURRENT_PROJECT_VERSION: "55"

configs:
  Debug: debug
  Release: release

packages:
  # ---- Remote SPM packages (versions from Package.resolved) ----
  BigInt:
    url: https://github.com/attaswift/BigInt.git
    from: 5.1.0
  CodeScanner:
    url: https://github.com/twostraws/CodeScanner
    from: 2.3.3
  CryptoSwift:
    url: https://github.com/krzyzanowskim/CryptoSwift.git
    from: 1.8.2
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: 6.5.11
  SwiftLintPlugins:
    url: https://github.com/SimplyDanny/SwiftLintPlugins
    from: 0.63.1
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
  VultisigCommonData:
    url: https://github.com/vultisig/commondata
    # Temporary: pinned to the head of vultisig/commondata#83
    # (`TRANSACTION_TYPE_QBTC_CLAIM_WITH_PROOF` + `QbtcClaimContext` replaced
    # by `is_qbtc_claim` bool, merged with main for Cardano tokens + DAppMetadata).
    # Flip to a `revision: <merge-sha>` once that PR merges.
    revision: c26bb9f9839429967a47fc44bd0440958e755709
  WalletCore:
    url: https://github.com/vultisig/walletcore-spm
    exactVersion: 4.3.19
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.0
  # ---- Local SPM package ----
  Mediator:
    path: ../Mediator

targets:
  # ========================================================================
  #  VultisigApp — main iOS + macOS application
  # ========================================================================
  VultisigApp:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "15.0"

    sources:
      - path: VultisigApp
        excludes:
          - "**/.DS_Store"
          - "Preview Content/**"
      - path: VultisigApp/Preview Content
        buildPhase: resources
      # Xcode 16 icon-stack bundle lives alongside the source folder.
      - path: Vultisig-Logo.icon
        buildPhase: resources
      # Info.plist and entitlements files are referenced via build settings
      # below, not via XcodeGen's `info:` / `entitlements:` blocks (which
      # would regenerate and overwrite them).

    # Developer-supplied configuration (SwapKit API key, etc.). The path is
    # gitignored — the committed companion is `VultisigApp.xcconfig.example`.
    # When the file is missing the build still succeeds; the SwapKit
    # integration disables itself at runtime via `SwapKitConfig.apiKey`.
    configFiles:
      Debug: VultisigApp.xcconfig
      Release: VultisigApp.xcconfig

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vultisig.wallet
        PRODUCT_NAME: $(TARGET_NAME)
        INFOPLIST_FILE: VultisigApp/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: VultisigApp/VultisigApp.entitlements
        CODE_SIGN_IDENTITY: "Apple Development"
        "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

        # Hardened runtime / sandbox (macOS)
        ENABLE_HARDENED_RUNTIME: YES
        "ENABLE_HARDENED_RUNTIME[sdk=macosx*]": YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: YES
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES

        # Resource access
        ENABLE_RESOURCE_ACCESS_CAMERA: YES
        ENABLE_RESOURCE_ACCESS_PHOTO_LIBRARY: YES
        ENABLE_USER_SELECTED_FILES: readwrite

        # Asset catalog
        ASSETCATALOG_COMPILER_APPICON_NAME: Vultisig-Logo
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES

        # Runtime paths
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
        "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": "@executable_path/../Frameworks"

        # Previews / dead code
        DEVELOPMENT_ASSET_PATHS: '"VultisigApp/Preview Content"'
        ENABLE_PREVIEWS: YES
        DEAD_CODE_STRIPPING: YES
        REGISTER_APP_GROUPS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

        # Info.plist keys (merged at build time because GENERATE_INFOPLIST_FILE=YES)
        INFOPLIST_KEY_CFBundleDisplayName: Vultisig
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
        INFOPLIST_KEY_NSCameraUsageDescription: We need to scan QR Codes.
        INFOPLIST_KEY_NSFaceIDUsageDescription: Secure your Vault using Face ID
        INFOPLIST_KEY_NSFileProviderDomainUsageDescription: We need to access your files.
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: We need access to the local network to discover services.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: We need access to your photo library to save photos.
        "INFOPLIST_KEY_NSScreenCaptureUsageDescription[sdk=macosx*]": "Vultisig needs screen recording permission to scan QR codes displayed on your screen."
        "INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UIStatusBarStyle[sdk=iphoneos*]": UIStatusBarStyleDefault
        "INFOPLIST_KEY_UIStatusBarStyle[sdk=iphonesimulator*]": UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown
        INFOPLIST_KEY_UISupportsDocumentBrowser: YES

      configs:
        Release:
          # Matches the current pbxproj — Release is effectively Debug-like.
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          ENABLE_TESTABILITY: YES
          ALLOW_TARGET_PLATFORM_SPECIALIZATION: YES

    dependencies:
      # ---- Local embedded xcframeworks (link-only, no embed) ----
      # NOTE: The current pbxproj pins an `expectedSignature` per xcframework.
      # XcodeGen does not yet surface that attribute; after running `xcodegen
      # generate` for the first time, verify in Xcode (General → Frameworks)
      # that each xcframework's "Do Not Embed" state and signature tags match
      # the values documented in docs/refactors/01-xcodegen.md.
      - framework: Tss.xcframework
        embed: false
      - framework: godkls.xcframework
        embed: false
      - framework: goschnorr.xcframework
        embed: false
      - framework: vscore.xcframework
        embed: false

      # ---- Remote SPM ----
      - package: BigInt
      - package: CodeScanner
      - package: CryptoSwift
      - package: RiveRuntime
      - package: VultisigCommonData
      - package: WalletCore
        product: WalletCore
      - package: WalletCore
        product: WalletCoreSwiftProtobuf
      - package: ZIPFoundation

      # ---- Local SPM ----
      - package: Mediator
        product: Mediator

    # SwiftPM build-tool plugin (runs before compile).
    buildToolPlugins:
      - plugin: SwiftLintBuildToolPlugin
        package: SwiftLintPlugins

  # ========================================================================
  #  VultisigAppTests — unit tests (iOS)
  # ========================================================================
  VultisigAppTests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    deploymentTarget:
      iOS: "17.2"
      macOS: "14.2"

    sources:
      - path: VultisigAppTests
        excludes:
          - "**/.DS_Store"
      # Static fixture JSONs bundled with the test target as a *folder
      # reference* (blue folder in Xcode) so they land at
      # `__fixtures__/*.json` inside the bundle instead of flattening into
      # the resource root. Flattening would collide with
      # `ChainHelperTests.testChainHelpers`, which enumerates every top-level
      # JSON and decodes it as `[ChainHelperTestCase]`.
      - path: VultisigAppTests/Swap/SwapKit/__fixtures__
        type: folder
        buildPhase: resources

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voltix.voltixAppTests
        PRODUCT_NAME: $(TARGET_NAME)
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VultisigApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VultisigApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        DEAD_CODE_STRIPPING: YES
        REGISTER_APP_GROUPS: YES
        SWIFT_EMIT_LOC_STRINGS: NO

    dependencies:
      - target: VultisigApp
      - package: SnapshotTesting

  # ========================================================================
  #  VultisigAppUITests — UI tests
  # ========================================================================
  VultisigAppUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.2"
      macOS: "14.2"

    sources:
      - path: VultisigAppUITests
        excludes:
          - "**/.DS_Store"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voltix.voltixAppUITests
        PRODUCT_NAME: $(TARGET_NAME)
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: VultisigApp
        TARGETED_DEVICE_FAMILY: "1,2"
        DEAD_CODE_STRIPPING: YES
        SWIFT_EMIT_LOC_STRINGS: NO

    dependencies:
      - target: VultisigApp

# ============================================================================
#  Schemes — kept explicit so CI and fastlane see the same names as before.
# ============================================================================
schemes:
  VultisigApp:
    build:
      targets:
        VultisigApp: all
    run:
      config: Debug
      environmentVariables:
        OS_ACTIVITY_MODE:
          value: disable
          isEnabled: false
    test:
      config: Debug
      testPlans:
        - path: VultisigApp.xctestplan
          defaultPlan: true
      targets:
        - VultisigAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  VultisigAppUITests:
    build:
      targets:
        # Host app only needs to launch (`run`) — UITests don't exercise its
        # unit tests, so dropping `test` keeps the UITest build lighter.
        VultisigApp: [run]
        VultisigAppUITests: [test]
    run:
      config: Debug
      executable: VultisigApp
    test:
      config: Debug
      testPlans:
        - path: VultisigAppUITests.xctestplan
          defaultPlan: true
      targets:
        - VultisigAppUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
