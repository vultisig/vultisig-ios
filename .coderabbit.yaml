# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'en-US'
early_access: false
reviews:
  profile: 'chill'
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: '**/*.swift'
      instructions: |
        Review for:
        - Hardcoded colors/fonts (must use Theme.colors.* and Theme.fonts.*)
        - .foregroundColor() usage (must use .foregroundStyle())
        - Hardcoded user-facing strings (must use .localized)
        - @Model access off MainActor
        - Completion handlers instead of async/await
        - Custom button styles instead of PrimaryButton
        - SwiftLint violations
    - path: '**/Localizable.strings'
      instructions: |
        Verify keys are in camelCase and alphabetical order.
        Ensure new keys appear in ALL 7 locale files.
    - path: '**/*.pbxproj'
      instructions: |
        Flag any direct pbxproj edits — these should use the /add-xcode-files skill.
chat:
  auto_reply: true
