# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for Vultisig iOS
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - main
      - master
  path_instructions:
    - path: "**/*.swift"
      instructions: |
        Review Guidelines:
        - SwiftUI with MVVM architecture
        - async/await for all concurrency, no completion handlers
        - Use Theme.colors.* and Theme.fonts.* — never hardcode colors/fonts
        - Use PrimaryButton for all buttons — never custom button styles
        - Use .foregroundStyle() not .foregroundColor()
        - Business logic in ViewModels/Services, never in views
        - Logger (OSLog) for logging, never print()
        - No force unwraps (!) in production code
        - @Model classes always on MainActor
        - Use "key".localized for all user-facing strings
    - path: "**/Localizable.strings"
      instructions: |
        Localization changes must be applied to ALL 7 locale files.
        Check: en.lproj/, de.lproj/, es.lproj/, hr.lproj/, it.lproj/, pt.lproj/, zh-Hans.lproj/
        Keys must be camelCase and in alphabetical order.
        Flag any untranslated strings (English text in non-English files).
    - path: "**/*.pbxproj"
      instructions: |
        This file should only be modified via the /add-xcode-files skill script.
        Flag any manual edits to this file.
  tools:
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 300000
chat:
  auto_reply: true
